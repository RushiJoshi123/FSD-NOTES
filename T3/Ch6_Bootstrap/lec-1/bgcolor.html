<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

    p{
        padding: 5px ;
        border-radius: 20px;
    }
   </style>
</head>
<body>

        <p class="bg-primary text-white">Hello</p>
        <p class="bg-success text-white">Hello</p>

        <p class="bg-warning text-white">Hello</p>
        <p class="bg-danger text-white">Hello</p>
        <p class="bg-secondary text-white">Hello</p>
        <p class="bg-dark text-white">Hello</p>

    </div>
    
</body>
