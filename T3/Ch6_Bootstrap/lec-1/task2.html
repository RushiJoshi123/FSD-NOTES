<!-- write html css script using bootstrap to set four images of some product horizontallly show their price,features and available quantity 
in grid system resposive effect must be observe  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-3 bg-warning" >
                <img src="img1.jpg" alt="">
                <pre>Price: 8888
                     Stock Available: 9999
                </pre>
            </div>
            <div class="col-sm-3 bg-success" >
                <img src="img1.jpg" alt="">
                <pre>Price: 8888
                    Stock Available: 9999
               </pre>
            </div>
            <div class="col-sm-3 bg-danger" >
                <img src="img1.jpg" alt="">
                <pre>Price: 8888
                    Stock Available: 9999
               </pre>
            </div>
            <div class="col-sm-3 bg-danger" >
                <img src="img1.jpg" alt="">
                <pre>Price: 8888 <br>Stock Available: 9999
               </pre>
            </div>
        </div>
    </div>
</body>
</html>
