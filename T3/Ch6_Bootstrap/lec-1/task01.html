<!-- write html css script using bootstrap to take 3 sections using div first section has text related component like 
paragraph abbreviation and pre tag second div has simple direct case in justify manner and last div has blockquote all
div width's are : 33.33% observe resposive class and use grid  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
   
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-4 bg-warning" >
                <abbr title="LJ University" style="text-decoration: none; ">LJ</abbr>
                <pre>Lorem ipsum dolor sit amet consectetur 
                    adipisicing elit. Ex, inventore.</pre>
            </div>
            <div class="col-sm-4 bg-success" >
                <p class="text-justify">Lorem ipsum dolor sit amet consectetur adipisicing elit. Fugiat, labore!\</p>
            </div>
            <div class="col-sm-4 bg-danger" >
                <blockquote class="blockquote">
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Alias, fugit.</p>
                    <footer class="blockquote-footer text-right">Abc</footer>
                </blockquote>
            </div>
        </div>
    </div>
</body>
</html>
