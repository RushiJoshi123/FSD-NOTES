<!-- design a form with following fields 
    username,password,address,gender,toggleswitch 
    also validate the form before submitting and each and every field is mandatory 
    add one submit button once user clicks on a submit button one dialogue box should open with confirmation 
    message like do you want to register ? with close button dialogue box contain header body and footer part  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-3">
        <form action="" class="needs-validation">
            <div class="mt-3">
                <label >Username:<input type="text"class="form-control" placeholder="enter username" required></label>
            </div>
            <div class="mt-3">
                <label>password
                    <input type="password" class="form-control" placeholder="enter password" required>
                </label>
            </div>
            <div class="mt-3">
                <label >Address:<input type="textbox"class="form-control" placeholder="enter Address" required></label>
            </div>
            <div class="mt-3">
                <label >Gender: <br>Male<input type="radio"  name="gender" placeholder="enter username" required>
                    Female<input type="radio"  name="gender" placeholder="enter username" required></label>
            </div>
            <div class="form-check form-switch">
                <label class="form-check-label" for="myswitch">On/Off</label>
                <input type="checkbox" class="form-check-input" id="myswitch" checked>
            </div>
            <div class="container mt-3">
                <button class="btn btn-info" data-bs-toggle="modal" data-bs-target="#ex">Submit </button>
                <div class="modal fade" id="ex">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5>Confirmation</h5>
                                <button class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">Do you want to register ? </div>
                            <div class="modal-footer">
                                <button class="btn btn-info" data-bs-dismiss="modal">Close</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
          
        </form>
    </div>
</body>
</html>
