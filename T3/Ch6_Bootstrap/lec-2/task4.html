<!-- Task : Progress Bar look :  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
<style>
  
    .btn{
        padding:20px;
        margin:10px;
    }
</style>
</head>
<body>
    <div class="container" style="border:1px solid black; margin:20px;">
        <div class="row">
            <div class="col-sm-3 " style="padding:20px">
                <button class="btn btn-danger">Whatsapp</button><br>
                <button class="btn btn-warning">Instagram</button><br>
                <button class="btn btn-success">Facebook</button><br>
            </div>
            <div class="col-sm-9" style="border:.5px solid black"><br><br>
                <div class="progress">
                    <div class="progress-bar bg-success progress-bar-striped  progress-bar-animated" style="width:30%">30%</div>
                </div><br><br><br>
                <div class="progress">
                    <div class="progress-bar bg-success   progress-bar-animated" style="width:20%">20%</div>
                </div><br><br><br>
                <div class="progress">
                    <div class="progress-bar bg-success progress-bar-striped  progress-bar-animated" style="width:40%">40%</div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
