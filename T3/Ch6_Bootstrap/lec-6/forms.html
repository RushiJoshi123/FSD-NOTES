<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt3">
        <h1 style="background-color: lightblue; border-radius: 50px;margin-right:800px;padding:10px">Stacked form </h1>
        <form >
            <div class="mt-3">
                <label for="email">Email</label>
                <input type="email" class="form-control" placeholder="Enter email">
            </div>
            <div class="mt-3">
                <label for="password">Password</label>
                <input type="password"  class="form-control" placeholder="enter password">
            </div>
            <div class="mt3 form-check">
                <label for="r1" class="form-check-label">
                    <input type="checkbox" class="form-check-input">
                    Remember me 
                    <BR></BR>
                </label>
            </div>
            Select Gender : 
            <div class="mt3 form-check">
                <label for="r1" class="form-check-label">
                    <input type="radio"name="m1" class="form-check-input">
                    Male
                </label>
            </div>
            <div class="mt3 form-check">
                <label for="r1" class="form-check-label">
                    <input type="radio"name="m1" class="form-check-input">
                    Female
                </label>
            </div>
            <BR>
            Addresss: 
            <div class="mt3">
          
                <label for="comment">
                    <Textarea rows="5" class="form-control"></Textarea>
                </label>
            </div>
            <!-- dropdown  -->
             <div class="mt-3">
                <div class="form-group">
                    <label >Select Country:
                        <select class="form-select">
                            <optgroup label="Asia">
                                <option value="">India</option>
                                <option value="">China</option>
                            </optgroup>
                        </select>
                    </label>
                </div>
             </div>
             <div class="container mt-3">
                <button class="btn btn-info" type="submit" data-bs-toggle="modal" data-bs-target="#ex"><h5>Submit</h5> </button>
                <div class="modal fade" id="ex">
                    <div class="modal-dialog modal-dialog-centered modal-sm">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5>Modal title</h5>
                                <button class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body"><h3>modal body</h3></div>
                            <div class="modal-footer">
                                <button class="btn btn-info" data-bs-dismiss="modal">Close</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    
  
</body>
</html>
