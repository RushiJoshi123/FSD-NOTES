    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

<body>
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark ">
            <div class="container-fluid">
                
                <ul class="navbar-nav">

                <div class="container mt-3">
                    <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#registerModal">Login</button>
        
                    <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
                        <div class="modal-dialog modal-sm">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title" id="registerModalLabel">Register</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                <form>
                                    <div class="modal-body">
                                   
                                        <div class="mt-3">
                                            <label for="registerUsername" class="form-label">Username</label>
                                            <input type="text" class="form-control" id="registerUsername" placeholder="Enter username" name="registerUsername">
                                        </div>
                                        <div class="mt-3">
                                            <label for="registerPassword" class="form-label">Password</label>
                                            <input type="password" class="form-control" id="registerPassword" placeholder="Enter password" name="registerPassword">
                                        </div>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="submit" class="btn btn-primary">Submit</button>
                                        <button type="reset" class="btn btn-secondary">Reset</button>
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                
                    <div class="container mt-3">
                        <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#ex2">Register </button>
                        <div class="modal fade" id="ex2">

                                <div class="modal-content left">
                                    <div class="modal-header">
                                        <h5>Register</h5>
                                        <br>
                                        <button class="btn-close" data-bs-dismiss="modal"></button>
                                    </div>
                                    <div class="modal-body">
                                        Welcome
                                    </div>
                                    <div class="modal-footer">
                                        <button class="btn" data-bs-dismiss="modal">Close</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>   

                <div id="demo" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-indicators ">
                        <button data-bs-target="#demo" data-bs-slide-to="0" bg-danger class="active bg-warning  "></button>
                        <button data-bs-target="#demo" data-bs-slide-to="1" bg-warning class="active bg-warning "></button>
                        <button data-bs-target="#demo" data-bs-slide-to="2" bg-warning class="active bg-warning "></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active ">
                            <img src="i1.jpeg" alt="" class="mx-auto d-block"style="height:300px; width:500px" >

                        <div class="carousel-item active">
                            <img src="i3.jpeg" alt="" class="mx-auto d-block"style="height:300px; width:500px" >
                        </div>
                    </div>
                    <button class="carousel-control-prev " data-bs-target="#demo" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon bg-dark"></span>
                    </button>
                    <button class="carousel-control-next " data-bs-target="#demo" data-bs-slide="next">
                        <span class="carousel-control-next-icon bg-dark"></span>
                    </button>
            
                </div>
