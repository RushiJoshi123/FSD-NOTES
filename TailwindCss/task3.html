<html>
    <head>
        <script src="https://cdn.tailwindcss.com"></script>
      </head>
      <body>
        <div id="main" class="flex justify-evenly p-4 border-2 border-black m-16"> 
            <div class="bg-green-500 h-32 w-48 text-white text-center text-6xl border-double border-8 rounded-2xl hover:animate-bounce">Green</div> 
            <div class="bg-red-500 h-32 w-48 text-white text-center text-6xl border-double border-8 rounded-2xl active:animate-spin">Red</div>  
            <div class="bg-blue-500 h-32 w-48 text-white text-center text-6xl border-double border-8 rounded-2xl hover:animate-pulse">Blue</div> 
            <div class="bg-yellow-500 h-32 w-48 text-white text-center text-6xl border-double border-8 rounded-2xl active:animate-ping">Yellow</div> 
            
            </div>
           
      </body>
</html>
