<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function fun(id){
            id.innerHTML="mouse moved"
        }
        function fun1(id){
            id.innerHTML="mouse out "
        }
    </script>
    <div onmouseover="fun(this)" onmouseout="fun1(this)" style="width:50px;height:50px;border:1px solid red; ">Heloo</div>
</body>
</html>
