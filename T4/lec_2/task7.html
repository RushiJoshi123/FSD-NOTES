<!-- write a js to find given number is lucky or not 
given number is lucky if sum of all its digit is equal to 1 
for ex : 7777 = 28 = 10 = 1  -->
<html>
    <head>
        <script>
            var s= "7777"
            var sum=0
            function calSum(num){
                sum=0
                for(i=0;i<num.length;i++){
                sum+= parseInt(num[i])
            }
            return sum.toString()
            }
            var n = s
            while(n.length != 1){
                n = calSum(n)
            }
       
            if(n == "1"){
                document.write("the number is lucky number ! ")
            }
            else {document.write("the number is not lucky number  ! ")}
            
        </script>
    </head>
</html>
