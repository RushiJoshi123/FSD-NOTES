<!-- write a js that finds position of first occurance of vowel 'a' and last occurance of vowel 'a' in given word
return the string between them 
     for ex : string is "Ajanta"
        returns : jant -->
<html>
    <head>
        <script>
             var x='ajanta'
            document.write(x.indexOf('a')+"<br>")
            document.write(x.lastIndexOf('a')+"<br>")
            document.write(x.substring(x.indexOf('a')+1,x.lastIndexOf('a'))+"<br>")
        </script>
    </head>
</html>
