<html>
    <head>
        <script>
            var x='this is FSD-1';
            var y='hello'
            document.write(x.charAt(3)+"<br>")
            document.write(x.charCodeAt(2)+"<br>")
            document.write(x.indexOf('F')+"<br>")
            document.write(x.lastIndexOf('s')+"<br>")
            document.write(x.replace('is','r')+"<br>")
            document.write(x.substr(2,5)+"<br>")
            document.write(x.substring(2,6)+"<br>")
            document.write(x.toUpperCase()+"<br>")
            document.write(x.toLowerCase()+"<br>")
            document.write(y.split('l')+"<br>")
        </script>
    </head>
</html>
