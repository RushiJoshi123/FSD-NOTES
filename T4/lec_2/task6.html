<!-- 
write a javascript program to print first five odd numbers divisible by 7  -->
<html>
    <head>
        <script>
            var i=0
            var count=0
            while(count<5){
                if(i%2!=0 && i%7==0){document.write(i+"<br>");count++}
                i++
            }
        </script>
    </head>
</html>
