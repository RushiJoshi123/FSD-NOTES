<!-- write a javascript to calculate area of triangle and rectangle  -->
<html>
    <head>
        <script>
            function triangle(b,h ){return 0.5*b*h  }
            function rectangle(l,b){return l*b  }
            document.write("area of triangle is : "+triangle(2,3)+"<br>")
            document.write("area of rectangle is : "+rectangle(3,4)+"<br>")
        </script>
    </head>
</html>
