<!-- write a js to handle following key events : 
    1. give key code for the key press 
    2. script should give message 'vowel is pressed ' on pressing vowel key 
    3. background color should change to red after releasing the pressed key  -->
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
         function fun(e){
            e.bgColor="red"
        }
        function fun1(e) {
    const a = ['a','e','i','o','u'];  
    if (a.includes(e.key.toLowerCase())) { 
        alert('Vowel is pressed! : ' + e.keyCode);
        return ; 
    }
    alert('Key pressed: ' + e.keyCode);  
}

  
    </script>
</head>
<body onkeypress="fun1(event)" onkeydown="fun(this)">
</body>
</html>
