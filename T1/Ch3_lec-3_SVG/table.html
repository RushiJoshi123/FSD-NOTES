<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    table{
        border-collapse: collapse;
        background-color:lightyellow;
        border-radius: 10px;
        justify-content: left;
        display:flex;
        margin-right: 190px;
        justify-items: center;
        empty-cells: clear;
    }
</style>

<body>
    <table border="3">
        <tr>
            <th rowspan="2">A</th>
            <th colspan="2">B</th>
            <th>D</th>
        </tr>
        <tr>
            <th colspan="2">C</th>
            <th>E</th>
        </tr>
        <tr>
            <th>F</th>
            <th rowspan="2">G</th>
            <th>H</th>
            <th>I</th>
        </tr>
        <tr>
            <th>J</th>
            <th colspan="2">K</th>
        </tr>
    </table>
</body>
</html>
