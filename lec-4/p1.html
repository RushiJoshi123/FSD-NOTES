<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif
            
        }
        .table {
            background-color: bisque;
            border-radius: 40px;
            padding: 20px;
            border-collapse: collapse; /* Ensures table borders are collapsed */
            font-weight: bold;
        }
        .table td {
            padding: 10px; /* Adds padding to table cells */
        }
        .form {
            border-radius: 20px;
            padding: 0; /* No padding around fieldset */
            border: none; /* Remove border */
        }
        fieldset {
            border:black; /* Ensure fieldset has no border */
            margin: 0; /* Remove margin */
            padding: 20px; /* Remove padding */
        }
    </style>
</head>

<body>
    <form action="test.html" method="get">
        <fieldset class="form">
            <legend align="center">Signup</legend>
            <table align="center" class="table" id="table">
                <tr>
                    <td>Name:</td>
                    <td><input type="text" maxlength="10" name="Your name:" placeholder="enter name"></td>
                </tr>
                <tr>
                    <td>Password:</td>
                    <td><input type="password" placeholder="enter password" maxlength="8"></td>
                </tr>
                <tr>
                    <td>
                        <input type="submit"/>
                        <button type="submit">Submit</button>
                        <input type="reset"/>
                    </td>
                </tr>
                <tr>
                    <td>
                        Gender:<br>
                        Male <input type="radio" name="n1" value="male" checked>
                        Female <input type="radio" name="n1" value="female">
                    </td>
                </tr>
                <tr>
                    <td>Area of Interest:</td>
                    <td>DS <input type="checkbox" value="ds" checked/>
                        DBMS <input type="checkbox" value="dbms" checked/></td>
                </tr>
                <tr>
                    <td>Upload CV</td>
                    <td><input type="file"></td>
                </tr>
                <tr>
                    <td>Email:</td>
                    <td><input type="email"></td>
                </tr>
                <tr>
                    <td>Birthdate:</td>
                    <td><input type="date"></td>
                </tr>
                <tr>
                    <td>Search here:</td>
                    <td><input type="search"></td>
                </tr>
                <tr>
                    <td>Number:</td>
                    <td><input type="number" min="1" max="10" step="2" name="number type"></td>
                </tr>
                <tr>
                    <td>Range</td>
                    <td><input type="range"></td>
                </tr>
                <tr>
                    <td>Address:</td>
                    <td><textarea placeholder="enter your address"></textarea></td>
                </tr>
                <tr>
                    <td>Select Department:</td>
                    <td>
                        <select label="CE">
                            <option>CSE</option>
                            <option>CE</option>
                            <optgroup label="csd">
                                <option>BSC</option>
                                <option>AIML</option>
                                <option>AIDS</option>
                            </optgroup>
                        </select>
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>
</body>
</html>
