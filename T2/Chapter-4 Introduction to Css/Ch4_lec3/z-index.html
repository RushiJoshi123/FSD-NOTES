<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            position: fixed;
            width: 400px;
            height: 400px;
            background-color: red;
        }
        img{
            position: absolute;
            top:0px;
            left:0px;
            z-index: 1;
        }
        h1{
            z-index: 2;
            color: blue;
            position: relative;
        }

    </style>
</head>
<body>
    <div>
        <h1>Img Demo</h1>
        <img src="img.png" alt="error">
    </div>
</body>
</html>
