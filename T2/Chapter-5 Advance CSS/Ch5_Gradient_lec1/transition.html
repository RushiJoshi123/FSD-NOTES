<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width:100px;
            height:100px;
            background-color: red;
            transition: width 1s;
            transition-delay: 20ms;
            border-radius: 50%;

        }
        div:hover{
            width:300px;
        }
        img{
            width:100px;
            height:100px;
            background-color: red;
            transition: width 1s;
            transition-delay: 20ms;
            transition-property: height;
            border-radius: 50%;
        }
        img:hover{
            width:300px;
        }
    </style>
</head>
<body>
    <div>
        <img src="download.jpg" alt="">
    </div>
</body>
</html>
