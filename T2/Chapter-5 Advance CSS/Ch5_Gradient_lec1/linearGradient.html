<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            color:white}
        .d1{ background-image: repeating-linear-gradient(red,blue); }
        .d2{ background-image: linear-gradient(to right,red,yellow); }
        .d3{background-image:linear-gradient(to left,red,yellow);}
        .d4{background-image: linear-gradient(to bottom right,red, yellow,cyan);}
        .d5{background-image: linear-gradient(violet,indigo,blue,green,yellow,orange,red);}

    </style>
</head>
<body>
    <pre class="d1">This is ex of linear gradient1</pre>
    <pre class="d2">This is ex of linear gradient2</pre>
    <pre class="d3">This is ex of linear gradient3</pre>
    <pre class="d4">This is ex of linear gradient4</pre>
    <pre class="d5">This is ex of linear gradient5</pre>
</body>
</html>
