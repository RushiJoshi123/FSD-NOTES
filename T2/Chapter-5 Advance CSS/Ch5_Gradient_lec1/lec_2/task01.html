<!-- write html css code that add some text to an image in the bottom left corner and top right corner also use opacity property 
of image to make an image -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .d1 {
            position: relative;
            width: 500px;

            height: 300px; 
            border: 2px solid black;
        }

        .d1 img {
            width: 100%;
            height: 100%;
            border: 2px solid black;
            opacity: 0.7; 
        }
        .bottom-left {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); 
        }
        .top-right {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>
    <div class="d1">
        <img src="image.jpg" alt="Image">
        <div class="bottom-left">Bottom Left Text</div>
        <div class="top-right">Top Right Text</div>
    </div>
</body>
</html>
