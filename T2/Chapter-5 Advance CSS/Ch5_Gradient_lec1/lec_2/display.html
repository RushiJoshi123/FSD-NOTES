<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .p1{
            display:none;
        }
        .p2{
            display:inline;
            color:red;
        }
        .p3{
            display:inline;
            border:1px solid red;
            width : 50px ;
            height:50px;
        }
        .p4{
            display:block;
            border:1px solid red;
            color: red;
        }
    </style>
</head>
<body>
    <div>This is demo <p class="p1">hello</p></div>
    <div>This is demo <p class="p2">hello</p></div>
    <div>This is demo <p class="p3">hello</p></div>
    <div>This is demo <p class="p4">hello</p></div>
</body>
</html>
