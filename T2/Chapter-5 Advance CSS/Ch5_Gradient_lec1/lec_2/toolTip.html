<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>'
    <style>
        .tooltip{
            display:inline-block;
            border-bottom:2px dotted red;
        }
        .tooltip .tooltiptext{
            visibility:hidden;
            width:120px;
            background-color:black;
            color:white;
            border-radius: 5px;
            padding: 5px;
            position: absolute;

        }
        .tooltip:hover .tooltiptext {
            visibility: visible;

        }
    </style>
</head>
<body>
    <div class="tooltip">
        HTML
        <span class="tooltiptext">Hyper text markup language </span>
    </div>
</body>
</html>
