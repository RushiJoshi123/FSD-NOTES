<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            /* global variable  */
            --b:blue;
            --c:pink;
            --xyz:center;

        }
        h1{
            /* Local variable */
            --b1:red;
            color:var(--b1)
        }
        p{
            background-color: var(--b);
            color:var(--c);
            text-align:var(--xyz)
        }
    </style>
</head>
<body>
    <h1>hello</h1>
    <p>good morning </p>
</body>
</html>
