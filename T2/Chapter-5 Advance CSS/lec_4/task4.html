<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    
        h1::first-letter{
            color:red;
            font-size:160%;
        }

    </style>
</head>

    <h1 class="h1">This is heading </h1>
    <h1 class="h2">This is heading 2</h1>
</body>
